{% extends "base.html" %}

{% block title %}Miembros - Iglesia App{% endblock %}

{% block content %}
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>👥 Gestión de Miembros</h2>
        
        <div>
            <span class="badge bg-primary fs-6 me-2">{{ miembros|length }} miembros</span>
            
            {% if session.rol == 'admin' %}
            <a href="{{ url_for('exportar_miembros') }}" class="btn btn-success btn-sm">
                📊 Exportar a Excel
            </a>
            {% endif %}
        </div>
    </div>

    <!-- Resto del archivo (buscador, formulario, tabla) se mantiene igual que antes -->
    <!-- ... (el resto del código que ya tenías) ... -->

</div>
{% endblock %}
